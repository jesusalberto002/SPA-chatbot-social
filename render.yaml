databases:
  - name: haivens-db
    plan: free # <-- ADD THIS LINE
    databaseName: haivens_db
    user: haivens_user

services:
  # Backend Service (Node.js/Express)
  - type: web
    name: haivens-backend
    plan: free # <-- ADD THIS LINE
    runtime: node
    repo: https://github.com/jesusalberto002/haivens.git
    branch: main
    rootDir: ./backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npx prisma db seed
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: haivens-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 1d
      - key: NODE_ENV
        value: production

  # Frontend Service (React/Vite)
  - type: web
    name: haivens-frontend
    runtime: static # Static sites are free by default, so no plan is needed.
    repo: https://github.com/jesusalberto002/haivens.git
    branch: main
    rootDir: ./webFrontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://haivens-backend.onrender.com/api